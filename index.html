<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zufälliger Fun Fact</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            text-align: center; 
            background-color: #f4f4f9; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 90vh; 
            margin: 0; 
            padding: 20px;
        }
        #fact-container { 
            font-size: 22px; 
            font-weight: bold; 
            padding: 30px; 
            background: white; 
            border-radius: 15px; 
            box-shadow: 0 6px 12px rgba(0,0,0,0.1); 
            max-width: 500px; 
            margin-top: 15px; 
            line-height: 1.5; 
        }
        #category-container { 
            font-size: 14px; 
            color: #888; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
        }
        button { 
            margin-top: 30px; 
            padding: 15px 30px; 
            font-size: 16px; 
            font-weight: bold;
            background-color: #ff6b6b; 
            color: white; 
            border: none; 
            border-radius: 25px; 
            cursor: pointer; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: 0.2s;
        }
        button:hover { 
            background-color: #ff5252; 
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div id="category-container"></div>
    <div id="fact-container">Dein Fakt wird geladen...</div>
    <button onclick="zeigeNeuenFakt()">Noch ein Fakt!</button>

    <script>
        // Hier sind alle Fakten sicher direkt hinterlegt
        const faktenDaten = `Tiere;Der Floh kann bis zum 200-fachen seiner eigenen Höhe springen. Das entspricht dem Sprung eines Menschen auf das Empire State Building in New York.

Jan Fact;Der Abstand zur Dartscheibe beträgt 2,37m, weil das die Länge von Jans Penis ist.`;

        let alleFakten = [];

        // Die Daten im Hintergrund sortieren
        const zeilen = faktenDaten.split('\n');
        for (let i = 0; i < zeilen.length; i++) {
            let zeile = zeilen[i].trim();
            if (zeile !== "") {
                let teile = zeile.split(';');
                if(teile.length >= 2) {
                    alleFakten.push({ kategorie: teile[0].trim(), fakt: teile[1].trim() });
                }
            }
        }

        // Funktion, um einen zufälligen Fakt anzuzeigen
        function zeigeNeuenFakt() {
            const randomIndex = Math.floor(Math.random() * alleFakten.length);
            const auswahl = alleFakten[randomIndex];
            
            document.getElementById('category-container').innerText = auswahl.kategorie;
            document.getElementById('fact-container').innerText = auswahl.fakt;
        }

        // Direkt beim ersten Laden der Seite ausführen
        window.onload = zeigeNeuenFakt;
    </script>

</body>
</html>
